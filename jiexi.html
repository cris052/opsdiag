<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>系统诊断报告解析 · 智能运维</title>
<style>
  :root{
    --bg:#ffffff; --panel:#ffffff; --muted:#5f6b7b; --text:#1c2333; --accent:#2b6cff; --ring:#a8c0ff;
    --ok:#1f9d55; --warn:#b58900; --err:#e02424; --chip:#f3f6ff; --border:#e6e9f2; --code:#f7f9ff;
    --think:#f2f6ff; --think-border:#c8d6ff; --success:#dcfce7; --success-border:#16a34a;
    --warning:#fef3c7; --warning-border:#d97706; --error:#fecaca; --error-border:#dc2626;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;background:var(--bg);
    color:var(--text); font:14px/1.6 "Inter",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  }
  .app{max-width:1400px;margin:28px auto;padding:0 16px}
  .card{background:var(--panel); border:1px solid var(--border); border-radius:16px; box-shadow:0 6px 24px rgba(0,0,0,0.06)}
  header.card{padding:18px 20px; display:flex; gap:12px; align-items:center; justify-content:space-between}
  h1{font-size:18px;margin:0}
  .controls{display:flex;gap:10px;flex-wrap:wrap}
  .chip{border:1px solid var(--border); background:var(--chip); color:var(--text); padding:6px 10px; border-radius:999px; display:inline-flex; align-items:center; gap:8px}
  .chip input,.chip select{border:none; background:transparent; color:inherit; outline:none}
  .chip button{all:unset; cursor:pointer; padding:2px 6px; border-radius:8px}
  .chip button:hover{background:#eef2ff}
  .toolbar{display:flex; gap:8px; flex-wrap:wrap}
  .btn{border:1px solid var(--border); background:#fff; padding:8px 12px; border-radius:12px; cursor:pointer}
  .btn:hover{border-color:var(--ring); background:#f7faff}
  
  /* 左右分栏布局 */
  .main-grid{display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:16px}
  .left-panel.card{padding:16px}
  .right-panel.card{padding:16px}
  
  /* 诊断报告样式 */
  .diagnosis-section h2{font-size:16px; margin:0 0 12px 0; color:var(--accent); border-bottom:2px solid var(--border); padding-bottom:8px}
  .status-summary{background:#fff; border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:16px}
  .status-table{width:100%; border-collapse:collapse; margin-bottom:16px}
  .status-table th{background:var(--chip); padding:8px 12px; text-align:left; font-weight:600; border:1px solid var(--border)}
  .status-table td{padding:8px 12px; border:1px solid var(--border); vertical-align:top}
  .status-normal{color:var(--ok); font-weight:600}
  .status-error{color:var(--err); font-weight:600}
  .status-warning{color:var(--warn); font-weight:600}
  
  .issue-item{background:#fff; border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:12px}
  .issue-item.error{background:var(--error); border-color:var(--error-border)}
  .issue-item.warning{background:var(--warning); border-color:var(--warning-border)}
  .issue-title{font-weight:600; font-size:15px; margin-bottom:8px; display:flex; align-items:center; gap:8px}
  .issue-content{font-size:13px; line-height:1.5}
  .issue-list{margin:8px 0; padding-left:16px}
  .issue-list li{margin-bottom:4px}
  
  /* 日志解析样式 */
  .log-section h2{font-size:16px; margin:0 0 12px 0; color:var(--accent); border-bottom:2px solid var(--border); padding-bottom:8px}
  .module-item{background:#fff; border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:12px}
  .module-header{display:flex; align-items:center; gap:8px; margin-bottom:8px; padding-bottom:8px; border-bottom:1px solid var(--border)}
  .module-title{font-weight:600; font-size:14px}
  .module-status{padding:2px 8px; border-radius:12px; font-size:12px; font-weight:600}
  .module-status.success{background:var(--success); color:var(--ok)}
  .module-status.error{background:var(--error); color:var(--err)}
  .module-status.warning{background:var(--warning); color:var(--warn)}
  
  .check-item{margin-bottom:8px; padding:8px; background:var(--code); border-radius:8px; font-size:13px}
  .check-item strong{color:var(--accent)}
  .check-content{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace; font-size:12px; background:#f8fafc; padding:8px; border-radius:6px; margin-top:4px; white-space:pre-wrap; word-break:break-word}
  
  .node-info{font-size:12px; color:var(--muted); margin-bottom:4px}
  .status-badge{padding:2px 6px; border-radius:4px; font-size:11px; font-weight:600}
  .status-badge.ok{background:var(--success); color:var(--ok)}
  .status-badge.error{background:var(--error); color:var(--err)}
  
  .footer{opacity:.7; text-align:center; padding:14px 0; font-size:12px}
  @media (max-width:1200px){ .main-grid{grid-template-columns:1fr} }
</style>
</head>
<body>
<div class="app">
  <header class="card">
    <h1>系统诊断报告解析 <span style="opacity:.7;font-weight:400">· 智能运维 / 左右分栏</span></h1>
    <div class="controls">
      <span class="chip">
        🔍
        <input id="q" placeholder="搜索关键字" />
        <button id="clear">清空</button>
      </span>
      <span class="chip">
        📊 显示模式
        <select id="viewMode">
          <option value="all">全部显示</option>
          <option value="error">仅显示异常</option>
          <option value="normal">仅显示正常</option>
        </select>
      </span>
    </div>
    <div class="toolbar">
      <button class="btn" id="refreshData">🔄 刷新数据</button>
      <button class="btn" id="exportReport">📋 导出报告</button>
    </div>
  </header>

  <div class="main-grid">
    <div class="left-panel card">
      <div class="diagnosis-section">
        <h2>🏥 诊断报告总览</h2>
        <div id="diagnosisContent"></div>
      </div>
    </div>
    
    <div class="right-panel card">
      <div class="log-section">
        <h2>📋 日志与指标解析</h2>
        <div id="logContent"></div>
      </div>
    </div>
  </div>

  <div class="footer">系统诊断报告解析界面已启用。左侧显示诊断报告总览，右侧显示详细日志解析。</div>
</div>

<script>
// 诊断报告数据（来自b.txt）
const diagnosisData = `✅ 组件当前状态汇总
组件	节点	当前状态	说明
apisix	10.88.4.195, 10.88.4.196	异常	SSL证书有效期无法获取，访问日志检查失败
ceph-osd	10.88.4.193, 10.88.4.194, 10.88.4.195, 10.88.4.196	✅ 正常	所有OSD进程正常
ceph-mon	10.88.4.193, 10.88.4.194, 10.88.4.195, 10.88.4.196	✅ 正常	集群健康状态正常
mon_leader	10.88.4.193, 10.88.4.194, 10.88.4.195, 10.88.4.196	✅ 正常	集群健康、容量正常
slb	10.88.4.197, 10.88.4.198	✅ 正常	仅存在YAML加载警告
keepalived	10.88.4.197, 10.88.4.198	✅ 正常	VIP正常，未发现异常
apisix访问日志	10.88.4.195, 10.88.4.196	❌ 异常	日志检查失败
ceph慢操作日志	10.88.4.193	❌ 异常	检查失败，可能有性能问题

🔧 异常信息详解
1. SSL证书有效期检查失败
节点：10.88.4.195, 10.88.4.196
异常信息：
{"changed": false, "msg": "无法获取证书有效期", "failed": true}
可能原因：
证书文件路径错误或权限不足
证书文件损坏
openssl 命令未正确安装或不可用
脚本未正确处理证书输出格式
影响：
无法预警证书过期，可能导致 HTTPS 服务中断
建议操作：
检查证书文件是否存在及权限是否正确
确认证书是否已正确加载到 Nginx/Envoy 等服务中
在 Ansible 脚本中增加调试输出，确认 openssl 命令执行是否正常
2. Apisix访问日志检查失败
节点：10.88.4.195, 10.88.4.196
异常信息：
{"changed": false, "msg": "Failed", "failed": true, "rc": 1}
可能原因：
日志文件路径配置错误
日志文件不存在或权限不足
日志未被正确写入（服务未运行或日志记录功能被禁用）
检查脚本存在逻辑错误
影响：
无法通过日志分析请求行为，影响运维与故障排查
建议操作：
检查日志路径配置是否正确（如 /usr/local/apisix/logs/access.log）
检查文件是否存在，权限是否为 644 或 600（如 nginx 用户可读）
确认 Apisix 是否正常运行并输出日志
3. Ceph慢操作日志异常
现象：ceph-slow-ops.log检查失败（返回码1）。
SOP解决方案：
检查Ceph集群健康状态（ceph health），查看是否有告警。
查看慢操作日志内容（cat /var/log/ceph/ceph-slow-ops.log），分析是否有延迟操作。
优化存储性能：
检查OSD磁盘IO负载，必要时增加缓存或替换硬件。
调整osd_max_split_time等参数以限制慢操作。
修改检查脚本逻辑，增加日志内容校验（如只报错当慢操作数量>阈值）。
4. SLB YAML兼容性警告
现象：slb模块提示YAML格式兼容性问题。
SOP解决方案：
检查Ansible版本是否支持当前YAML语法（如使用---分隔符）。
验证YAML文件格式（使用yamllint工具检查语法）。
更新脚本兼容性声明（如添加yaml标签或调整缩进）。`;

// 日志解析数据（来自a.txt的关键部分）
const logModules = [
  {
    name: 'APISIX 模块',
    nodes: ['10.88.4.195', '10.88.4.196'],
    status: 'warning',
    checks: [
      { name: 'APISIX 服务状态', meaning: '检查 APISIX 是否运行', status: '正常' },
      { name: 'APISIX Worker 数量', meaning: 'Worker 数量应在 24-32 之间', status: '正常 (Worker 数: 25)' },
      { name: '80 端口监听', meaning: '检查 HTTP 业务端口是否监听', status: '正常' },
      { name: '443 端口监听', meaning: '检查 HTTPS 端口是否监听', status: '正常' },
      { name: 'SSL 证书有效期', meaning: '检查证书是否即将过期（小于60天）', status: '异常 - 无法获取证书有效期' }
    ]
  },
  {
    name: 'OSD 模块',
    nodes: ['10.88.4.193', '10.88.4.194', '10.88.4.195', '10.88.4.196'],
    status: 'success',
    checks: [
      { name: 'ceph-osd 进程状态', meaning: '检查 ceph-osd 进程是否运行', status: '正常 (进程数: 20)' }
    ]
  },
  {
    name: 'MON 模块',
    nodes: ['10.88.4.193', '10.88.4.194', '10.88.4.195'],
    status: 'success',
    checks: [
      { name: 'ceph-mgr 进程状态', meaning: '检查 ceph-mgr 进程是否运行', status: '正常 (进程数: 1)' },
      { name: 'ceph-mon 进程状态', meaning: '检查 ceph-mon 进程是否运行', status: '正常 (进程数: 1)' }
    ]
  },
  {
    name: 'MON Leader',
    nodes: ['10.88.4.193'],
    status: 'success',
    checks: [
      { name: 'Ceph 集群健康状态', meaning: '检查集群是否为 HEALTH_OK', status: '正常' },
      { name: 'Dataset 健康状态', meaning: '检查所有 PGS 是否为 active+clean', status: '正常' },
      { name: 'EOS 集群容量使用率', meaning: '检查使用率是否超过80%', status: '正常 - 使用率: 4.63%' },
      { name: 'VIP 连通性', meaning: '检查 VIP 是否可访问（返回200）', status: '正常 (HTTP 200)' }
    ]
  },
  {
    name: 'SLB 模块',
    nodes: ['10.88.4.197', '10.88.4.198'],
    status: 'warning',
    checks: [
      { name: 'SLB 服务状态', meaning: '检查 SLB 是否运行正常', status: '正常 (存在YAML加载警告)' }
    ]
  },
  {
    name: 'Keepalived',
    nodes: ['10.88.4.195', '10.88.4.196'],
    status: 'success',
    checks: [
      { name: 'keepalived 服务状态', meaning: '检查 keepalived 是否运行', status: '正常' }
    ]
  }
];

function renderDiagnosis() {
  const container = document.getElementById('diagnosisContent');
  const lines = diagnosisData.split('\n');
  let html = '';
  
  // 状态汇总表格
  html += '<div class="status-summary">';
  html += '<h3>📊 组件状态汇总</h3>';
  html += '<table class="status-table">';
  html += '<thead><tr><th>组件</th><th>节点</th><th>状态</th><th>说明</th></tr></thead><tbody>';
  
  const tableLines = lines.slice(2, 10); // 提取表格数据行
  tableLines.forEach(line => {
    if (line.trim()) {
      const parts = line.split('\t');
      if (parts.length >= 4) {
        const status = parts[2].includes('正常') ? 'normal' : 'error';
        html += `<tr>
          <td><strong>${parts[0]}</strong></td>
          <td><code>${parts[1]}</code></td>
          <td><span class="status-${status}">${parts[2]}</span></td>
          <td>${parts[3]}</td>
        </tr>`;
      }
    }
  });
  html += '</tbody></table></div>';
  
  // 异常详解
  html += '<h3>🔧 异常详解</h3>';
  let currentIssue = null;
  let issueContent = '';
  
  for (let i = 11; i < lines.length; i++) {
    const line = lines[i];
    if (line.match(/^\d+\./)) {
      if (currentIssue) {
        html += renderIssueItem(currentIssue, issueContent);
      }
      currentIssue = line;
      issueContent = '';
    } else if (line.trim()) {
      issueContent += line + '\n';
    }
  }
  if (currentIssue) {
    html += renderIssueItem(currentIssue, issueContent);
  }
  
  container.innerHTML = html;
}

function renderIssueItem(title, content) {
  const isError = title.includes('失败') || title.includes('异常');
  const cssClass = isError ? 'error' : 'warning';
  const icon = isError ? '❌' : '⚠️';
  
  return `<div class="issue-item ${cssClass}">
    <div class="issue-title">${icon} ${title}</div>
    <div class="issue-content">${formatIssueContent(content)}</div>
  </div>`;
}

function formatIssueContent(content) {
  return content
    .replace(/节点：([^\n]+)/g, '<strong>节点：</strong><code>$1</code>')
    .replace(/异常信息：([^\n]+)/g, '<strong>异常信息：</strong><br><code>$1</code>')
    .replace(/可能原因：/g, '<strong>可能原因：</strong>')
    .replace(/影响：/g, '<strong>影响：</strong>')
    .replace(/建议操作：/g, '<strong>建议操作：</strong>')
    .replace(/SOP解决方案：/g, '<strong>SOP解决方案：</strong>')
    .replace(/现象：([^\n]+)/g, '<strong>现象：</strong>$1')
    .replace(/\n/g, '<br>');
}

function renderLogAnalysis() {
  const container = document.getElementById('logContent');
  let html = '';
  
  logModules.forEach(module => {
    html += `<div class="module-item">
      <div class="module-header">
        <span class="module-title">🔧 ${module.name}</span>
        <span class="module-status ${module.status}">${getStatusText(module.status)}</span>
      </div>
      <div class="node-info">📍 节点: ${module.nodes.join(', ')}</div>`;
    
    module.checks.forEach(check => {
      const isError = check.status.includes('异常');
      const statusClass = isError ? 'error' : 'ok';
      html += `<div class="check-item">
        <strong>检查项:</strong> ${check.name}<br>
        <strong>意义:</strong> ${check.meaning}<br>
        <strong>状态:</strong> <span class="status-badge ${statusClass}">${check.status}</span>
      </div>`;
    });
    
    html += '</div>';
  });
  
  container.innerHTML = html;
}

function getStatusText(status) {
  switch(status) {
    case 'success': return '✅ 正常';
    case 'warning': return '⚠️ 警告';
    case 'error': return '❌ 异常';
    default: return '❓ 未知';
  }
}

// 搜索功能
function filterContent() {
  const query = document.getElementById('q').value.toLowerCase();
  const viewMode = document.getElementById('viewMode').value;
  
  // 这里可以实现搜索和过滤逻辑
  console.log('搜索:', query, '模式:', viewMode);
}

// 初始化
document.addEventListener('DOMContentLoaded', function() {
  renderDiagnosis();
  renderLogAnalysis();
  
  // 事件绑定
  document.getElementById('q').addEventListener('input', filterContent);
  document.getElementById('clear').onclick = () => { 
    document.getElementById('q').value = ''; 
    filterContent(); 
  };
  document.getElementById('viewMode').onchange = filterContent;
  document.getElementById('refreshData').onclick = () => {
    renderDiagnosis();
    renderLogAnalysis();
  };
  document.getElementById('exportReport').onclick = () => {
    // 导出功能
    console.log('导出报告');
  };
});
</script>
</body>
</html>
